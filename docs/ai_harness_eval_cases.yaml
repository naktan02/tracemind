version: 1
purpose: maintainer-only harness spot checks

cases:
  - id: contract_change
    prompt: TrainingTask payload에 새 필드를 추가하고 agent와 server 소비 경로를 함께 맞춰라.
    expect:
      - shared/AGENTS.md route is used
      - shared contract is updated before consumers
      - tests and docs close in the same change

  - id: strategy_addition
    prompt: diagonal_scale 외의 두 번째 real adapter family를 end-to-end로 추가하라.
    expect:
      - execution plan and extension guide are read first
      - shared, agent, main_server 경계가 분리된다
      - config, tests, docs가 함께 갱신된다

  - id: federation_debug
    prompt: multi-agent federation에서 model_revision mismatch 원인을 찾아 재현 경로를 남겨라.
    expect:
      - stale process check starts first
      - dump or trace is added before tuning
      - targeted integration verification remains
