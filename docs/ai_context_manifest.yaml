version: 1
repo: tracemind_server
goal: privacy-preserving personalized local inference + federated shared model improvement

canonical_layers:
  - .codex/config.toml
  - AGENTS.md
  - path-specific AGENTS.md
  - docs/ai_context_manifest.yaml
  - .codex/skills/*

source_of_truth_priority:
  - shared/src/contracts/*.py
  - shared/src/domain/entities/*
  - shared/src/contracts/README.md
  - plan.md
  - docs/project_execution_plan.md
  - docs/architecture/target-method-runtime-structure.md
  - docs/architecture/system-overview.md
  - docs/contracts/*
  - docs/strategy_surface_map.md
  - docs/api/*
  - docs/operations/local-runbook.md
  - docs/quality/*
  - docs/governance/*

document_interpretation:
  - docs listed in active_entrypoints or task route read_order are active guidance.
  - docs not listed there are reference or historical unless their own header says otherwise.
  - docs/notes/** is archive-only.
  - completed migration/status docs must not override docs/architecture/target-method-runtime-structure.md.

path_specific_instructions:
  - shared/AGENTS.md
  - agent/AGENTS.md
  - main_server/AGENTS.md
  - scripts/AGENTS.md
  - tests/AGENTS.md
  - docs/AGENTS.md
  - apps/AGENTS.md
  - apps/family_extension/AGENTS.md

active_entrypoints:
  - docs/execution_index.md
  - .codex/skills/tracemind-research-loop/SKILL.md
  - plan.md
  - docs/project_execution_plan.md
  - docs/architecture/system-overview.md
  - docs/architecture/target-method-runtime-structure.md
  - docs/architecture/code-expression-guidelines.md
  - docs/architecture/pattern-integrity-refactor-backlog.md
  - docs/architecture/method-owned-runtime-refactor-plan.md
  - docs/contracts/query_buffer_v1.md
  - docs/contracts/legacy_contract_ledger.md
  - docs/contracts/central_peft_text_encoder_trainer_contract.md
  - docs/contracts/fl_ssl_method_capability_matrix.md
  - docs/fl_runtime_implementation_checklist.md
  - docs/strategy_surface_map.md
  - docs/operations/local-runbook.md
  - docs/quality/test-strategy.md
  - docs/governance/document-governance.md
  - methods/README.md
  - methods/evaluation/README.md
  - methods/ssl/NEW_METHOD.md
  - conf/README.md
  - scripts/README.md

task_routes:
  contract_change:
    read_order:
      - AGENTS.md
      - relevant path-specific AGENTS.md
      - shared/src/contracts/README.md
      - relevant shared/src/contracts file
      - relevant producer and consumer files
    conditional_read:
      - docs/contracts/central_peft_text_encoder_trainer_contract.md for query-domain PEFT text encoder trainer contracts
      - docs/contracts/algorithm_extension_guide.md for strategy-axis contract changes
    verify:
      - producers and consumers stay aligned
      - related tests and docs are updated

  paper_track_experiment:
    read_order:
      - AGENTS.md
      - docs/execution_index.md
      - plan.md
      - docs/project_execution_plan.md
      - docs/architecture/target-method-runtime-structure.md
      - docs/architecture/method-owned-runtime-refactor-plan.md
      - docs/contracts/central_peft_text_encoder_trainer_contract.md
      - docs/contracts/query_buffer_v1.md
      - docs/contracts/fl_ssl_method_capability_matrix.md
      - scripts/AGENTS.md
      - relevant conf config group
      - relevant scripts/experiments entrypoint
    conditional_read:
      - docs/fl_runtime_implementation_checklist.md for FL SSL non-IID comparisons or runtime translation
    verify:
      - goal, fixed/changed variables, metric, seed, and output metadata are explicit
      - central SSL stays pooled/offline control unless explicitly promoted
      - FL SSL under non-IID is the main paper comparison for FL-specific methods
      - FL SSL main materialized split uses 10 clients, Dirichlet alpha=0.3, split seed=42, and selected labeled/unlabeled source pools unless a new decision changes it
      - FL SSL labeled source selection and labeled exposure policy are separate; shared_client_seed is a split exposure policy, not a shard policy
      - FL SSL default/main split uses Dirichlet alpha=0.3; alpha=0.1 is final stress/robustness only
      - FL SSL full-budget runs use explicit budget/long-run guard selection; validate new wiring with smoke or reduced runs before full-budget comparison
      - smoke/test artifacts stay under runs/_smoke and default dashboard ingest excludes them
      - default FL SSL manual baseline does not compose a method_descriptor; execution_role is manual_baseline and descriptor_name is null
      - do not add paper-method implementation files before the method list is explicitly selected
      - winner criteria include macro-F1 and worst-client macro-F1, with loss, weighted-F1, ECE/max-ECE, communication cost, and per-client variance as risk metrics

  strategy_addition:
    read_order:
      - AGENTS.md
      - docs/architecture/target-method-runtime-structure.md
      - docs/strategy_surface_map.md
      - docs/contracts/strategy_addition_playbook.md
      - docs/contracts/fl_ssl_method_capability_matrix.md
      - docs/architecture/method-owned-runtime-refactor-plan.md
      - methods/README.md
      - conf/README.md
      - relevant path-specific AGENTS.md
    conditional_read:
      - docs/contracts/algorithm_extension_guide.md when protocol details are needed
      - docs/notes/decisions/2026-05-28-archived-text-classifier-adaptation-refactor-plan.md only when auditing historical lora_classifier migration context
    verify:
      - family or strategy boundary stays explicit
      - config source of truth stays singular
      - tests and docs are closed together

  federation_debug:
    read_order:
      - AGENTS.md
      - agent/AGENTS.md
      - main_server/AGENTS.md
      - docs/fl_runtime_implementation_checklist.md
      - docs/architecture/method-owned-runtime-refactor-plan.md
    verify:
      - stale processes are checked first
      - dump, trace, or summary exists before tuning
      - reproduction path is left behind

  scripts_change:
    read_order:
      - AGENTS.md
      - scripts/AGENTS.md
      - relevant script entrypoint
      - relevant conf config group
    conditional_read:
      - scripts/README.md only for command discovery or cross-script convention
    verify:
      - Hydra config remains source of truth
      - script-only logic does not absorb runtime core

  docs_sync:
    read_order:
      - AGENTS.md
      - docs/AGENTS.md
      - docs/execution_index.md
      - docs/architecture/system-overview.md
      - docs/architecture/target-method-runtime-structure.md
      - docs/architecture/method-owned-runtime-refactor-plan.md
      - docs/project_execution_plan.md
      - methods/README.md
      - conf/README.md
    verify:
      - duplicate guidance is reduced
      - notes stay archive-only
      - source of truth remains code-adjacent

  family_extension_mvp:
    read_order:
      - AGENTS.md
      - docs/family_extension_wellbeing_signal_mvp_plan.md
      - apps/AGENTS.md
      - apps/family_extension/AGENTS.md
      - shared/src/contracts/README.md
    verify:
      - external UI only sees overall wellbeing signal
      - child and parent surfaces stay separated

archive_paths:
  - docs/notes/**

maintainer_docs:
  - docs/ai_harness_operating_model.md
  - docs/ai_harness_eval_cases.yaml
  - .codex/skills/THIRD_PARTY_NOTICES.md
