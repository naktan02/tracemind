# @package round_runtime

update_family_name: peft_text_encoder
payload_adapter_kind: peft_classifier
runtime_payload_key: peft_text_encoder
training_objective_payload_scope: peft_classifier
training_objective_payload_key: peft_text_encoder
training_objective_payload_excluded_keys:
  - artifact_format
  - peft_adapter_artifact_ref
  - classifier_head_artifact_ref
composition_slug_builder: methods.adaptation.peft_text_encoder.update_family_runtime.build_peft_text_encoder_composition_slug
round_runtime_payload_builder: methods.adaptation.peft_text_encoder.simulation_runtime.round_runtime.build_peft_encoder_round_runtime_payloads
local_objective_executors:
  - scripts.runtime_adapters.federated_agent.generic_client_runtime_bridge.run_method_owned_client_round_if_supported
  - scripts.runtime_adapters.federated_agent.generic_client_runtime_bridge.run_query_ssl_client_round_if_supported
client_round_runtime:
  base_state_materializer: scripts.runtime_adapters.federated_agent.base_state_materialization.load_peft_encoder_base_parameters_with_timing
  base_partition_state_materializer: scripts.runtime_adapters.federated_agent.base_state_materialization.load_peft_encoder_base_partition_parameters_with_timing
  delta_materializer_factory: methods.adaptation.peft_text_encoder.update.delta_artifacts.PeftEncoderDeltaMaterializer
  method_owned_local_training_core: methods.adaptation.peft_text_encoder.simulation_runtime.round_runtime.run_method_owned_peft_encoder_local_training_core
  transient_model_cache_releaser: methods.adaptation.peft_text_encoder.simulation_runtime.round_runtime.release_transient_model_cache
  update_artifact_byte_counter: methods.adaptation.peft_text_encoder.update.delta_artifacts.server_owned_peft_encoder_update_artifact_byte_count
  update_uploader: methods.adaptation.peft_text_encoder.update.delta_artifacts.upload_agent_local_peft_encoder_update
  query_ssl_training_backend_factory: methods.adaptation.peft_text_encoder.update_family_runtime.build_training_backend_for_peft_encoder_state
  query_ssl_request_factory: scripts.runtime_adapters.federated_agent.query_ssl_training_request.build_query_ssl_peft_encoder_local_training_request
  query_ssl_training_runner: scripts.runtime_adapters.federated_agent.query_ssl_training_request.run_query_ssl_peft_encoder_local_training
server_step_executors:
  supervised_seed_step: scripts.runtime_adapters.federated_server.generic_server_runtime_bridge.run_supervised_seed_step
server_round_runtime:
  supervised_seed_artifact_names: methods.adaptation.peft_text_encoder.simulation_runtime.supervised_seed.peft_encoder_supervised_seed_artifact_names
  supervised_seed_revision_builder: methods.adaptation.peft_text_encoder.simulation_runtime.supervised_seed.build_peft_encoder_supervised_seed_revision
  supervised_seed_projection_builder: methods.adaptation.peft_text_encoder.simulation_runtime.supervised_seed.build_peft_encoder_supervised_seed_projection_from_runtime_payload
  supervised_seed_seed: methods.adaptation.peft_text_encoder.simulation_runtime.supervised_seed.peft_encoder_supervised_seed_step_seed
  final_projection_state_resolver: methods.adaptation.peft_text_encoder.evaluation.require_peft_encoder_state
  final_projection_artifacts_builder: methods.adaptation.peft_text_encoder.simulation_runtime.final_projection.build_peft_encoder_final_projection_artifacts_from_state
initial_state_builder: methods.adaptation.peft_text_encoder.update_family_runtime.build_initial_peft_encoder_state
validation_evaluator: methods.adaptation.peft_text_encoder.evaluation.evaluate_peft_encoder_simulation_validation_payload
final_projection_builder: scripts.runtime_adapters.federated_server.generic_server_runtime_bridge.build_final_projection_artifacts
transient_resource_cleaner: methods.adaptation.peft_text_encoder.resource_cache.clear_peft_encoder_transient_resource_cache
release_transient_model_cache_after_client: true

runtime_payloads:
  peft_text_encoder:
    backbone_model_id: ${paper_backbone.model_id}
    backbone_revision: ${paper_backbone.revision}
    tokenizer_model_id: ${paper_backbone.tokenizer_model_id}
    tokenizer_revision: ${paper_backbone.tokenizer_revision}
    pooling: ${paper_backbone.pooling}
    max_length: ${paper_backbone.max_length}
    task_prefix: ${paper_backbone.task_prefix}
    peft_adapter_name: ${peft_adapter.peft_adapter_name}
    rank: ${peft_adapter.rank}
    alpha: ${peft_adapter.alpha}
    dropout: ${peft_adapter.dropout}
    bias: ${peft_adapter.bias}
    target_modules: ${peft_adapter.target_modules}
    use_rslora: ${peft_adapter.use_rslora}
    proximal_mu: 0.0
    delta_format: server_uploaded_artifact_ref
    artifact_ref_prefix: agent-local://peft_classifier
    text_metadata_keys: strong_text,training_text,raw_text,text,weak_text
    label_schema: ${dataset.label_categories}
    artifact_format: simulation_peft_classifier_state_ref
    peft_adapter_artifact_ref: null
    classifier_head_artifact_ref: null
