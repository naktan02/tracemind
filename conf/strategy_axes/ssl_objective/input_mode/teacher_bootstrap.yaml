# @package _global_

defaults:
  - /strategy_axes/ssl_objective/pseudo_label_selection: margin_threshold_v1
  - _self_

ssl_input_mode: teacher_bootstrap
central_ssl_runner:
  mode: teacher_bootstrap
  callable_path: scripts.support.query_ssl_peft.runners.bootstrap_teacher.run_teacher_bootstrap_peft_student
  group_by_query_ssl_method: false

teacher_train_jsonl: ${query_source.train_jsonl}
teacher_unlabeled_jsonl: ${query_source.unlabeled_jsonl}
teacher_embed_chunk_size: ${eval_batch_size}
teacher_train_batch_size: ${train_batch_size}
teacher_eval_batch_size: ${eval_batch_size}
teacher_epochs: ${epochs}
teacher_learning_rate: ${learning_rate}
teacher_weight_decay: ${weight_decay}
teacher_output_dir: ${central_ssl_budget.output_root}/teacher_bootstrap/${query_data_selection_slug}
teacher_model_output_dir: data/artifacts/teacher_bootstrap/fixed_embedding_checkpoint
teacher_classifier_version: ""
bootstrap_export_root: data/artifacts/query_peft_teacher_bootstrap
bootstrap_split:
  enabled: false
  unlabeled_ratio: 0.5
  seed: ${seed}
student_include_seed_train_rows: false
