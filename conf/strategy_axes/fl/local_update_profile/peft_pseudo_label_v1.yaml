# @package local_update_profile

# PEFT-classifier family 위에서 classifier logits 기반 pseudo-label selection을
# 사용한다.
# LoRA/DoRA 같은 mechanism은 round_runtime.runtime_payloads.peft_text_encoder
# 아래의 peft_adapter_name으로
# 구분하고, shared update payload는 peft_classifier v2 계약으로 쓴다.
algorithm_profile_name: peft_pseudo_label_v1
training_scope: adapter_only
training_backend_name: peft_classifier_trainer
confidence_threshold: 0.6
margin_threshold: 0.02
# selection 경로도 canonical PEFT-classifier family 이름을 기록한다.
# LoRA 전용 local update profile leaf는 제거했고, old-run reader compatibility는
# artifact/report loader 계층에서만 다룬다.
example_generation_backend_name: peft_classifier_raw_rows
evidence_backend_name: peft_classifier_logits
scorer_backend_name: peft_classifier_logits
score_policy_name: top1_probability
score_top_k: null
validation_scorer_backend_name: peft_classifier_eval
validation_score_policy_name: null
validation_score_top_k: null
pseudo_label_algorithm_name: top1_margin_threshold
acceptance_policy_name: top1_margin_threshold
privacy_guard_name: noop
evidence_backend_temperature: 1.0
