# @package _global_

defaults:
  - /execution_context/dataset_asset: ourafla
  - /execution_context/runtime_env: gpu_online
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

paths:
  raw_dir: ${dataset.output_root}/raw
  labeled_query_set_dir: ${dataset.output_root}/mapped
  split_dir: ${dataset.output_root}/splits
  pipeline_run_dir: ${dataset.output_root}/pipeline_runs
  cache_dir: data/cache/hf

only_stages: []
list_datasets: false

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
