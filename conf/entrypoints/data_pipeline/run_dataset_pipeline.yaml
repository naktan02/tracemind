# @package _global_

defaults:
  - /execution_context/dataset_asset: ourafla
  - /execution_context/runtime_env: gpu_online
  - /strategy_axes/prototype/build_strategy: single
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

paths:
  raw_dir: data/raw
  labeled_query_set_dir: data/processed/labeled_query_sets
  split_dir: data/processed/splits
  prototype_pack_dir: data/processed/prototype_packs
  prototype_build_state_dir: data/processed/prototype_build_states
  pipeline_run_dir: data/processed/pipeline_runs
  cache_dir: hf_cache

only_stages: []
list_datasets: false

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
