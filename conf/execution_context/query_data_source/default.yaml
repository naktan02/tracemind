    test_jsonl: data/datasets/ourafla_mental_health/query_ssl/labeled1024_per_class_seed42_v1/test.jsonl
  szegeelim_general4:
    labeled_jsonl: data/datasets/szegeelim_mental_health/views/labeled1024_per_class_seed42_v1/backtranslation_nllb_en_de_fr_usb_v1/labeled_train.with_views.jsonl
