  unlabeled_jsonl: ${query_data_sources.${query_data_selection.unlabeled}.unlabeled_jsonl}
  validation_jsonl: ${query_data_sources.${query_data_selection.validation}.validation_jsonl}
  test_jsonl: ${query_data_sources.${query_data_selection.test}.test_jsonl}

train_jsonl: ${query_source.train_jsonl}
unlabeled_jsonl: ${query_source.unlabeled_jsonl}
query_data_selection_slug: labeled-${query_data_selection.labeled}_unlabeled-${query_data_selection.unlabeled}_validation-${query_data_selection.validation}_test-${query_data_selection.test}
