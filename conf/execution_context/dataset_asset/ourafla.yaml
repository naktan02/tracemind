# @package dataset

name: ourafla
description: ourafla mental health 4-class dataset
output_root: data/datasets/ourafla_mental_health
raw_train_csv: data/raw/ourafla_train.csv
raw_test_csv: data/raw/ourafla_test.csv
train_labeled_jsonl: data/processed/labeled_query_sets/ourafla_mental_health_text_classification.v1.jsonl
test_labeled_jsonl: data/processed/labeled_query_sets/ourafla_mental_health_text_classification_test.v1.jsonl
split_name: ourafla_train_split.v1
train_jsonl: data/processed/splits/ourafla_train_split.v1.train.jsonl
validation_jsonl: data/processed/splits/ourafla_train_split.v1.validation.jsonl
test_jsonl: ${dataset.test_labeled_jsonl}
prototype_input_jsonl: ${dataset.train_jsonl}
query_dev_jsonl: null
query_calibration_jsonl: null
unlabeled_query_pool_jsonl: null
prototype_expected_categories:
  - anxiety
  - depression
  - normal
  - suicidal
stages:
  - download
  - map
  - split
  - prototype
sources:
  train:
    kind: huggingface
    dataset_id: ourafla/Mental-Health_Text-Classification_Dataset
    split: train
    data_file: mental_heath_unbanlanced.csv
    output_filename: ourafla_train.csv
    mapping_config: data/mappings/ourafla_to_4cat.v1.toml
    reference_urls:
      - https://huggingface.co/datasets/ourafla/Mental-Health_Text-Classification_Dataset
  test:
    kind: huggingface
    dataset_id: ourafla/Mental-Health_Text-Classification_Dataset
    split: test
    data_file: mental_health_combined_test.csv
    output_filename: ourafla_test.csv
    mapping_config: data/mappings/ourafla_test_to_4cat.v1.toml
    reference_urls:
      - https://huggingface.co/datasets/ourafla/Mental-Health_Text-Classification_Dataset
split:
  source: train
  split_name: ${dataset.split_name}
  validation_ratio: 0.1
  seed: 42
prototype:
  source: split_train
  backend: transformers_mxbai
  embedding_model_id: mixedbread-ai/mxbai-embed-large-v1
  embedding_model_revision: main
  batch_size: 16
  task_prefix: ""
  expected_categories: ${dataset.prototype_expected_categories}
  prototype_version_prefix: ourafla_mxbai
  hash_dim: 256
