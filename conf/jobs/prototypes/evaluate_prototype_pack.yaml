# @package _global_

defaults:
  - /dataset: ourafla
  - /embedding: mxbai
  - /runtime: gpu_online
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

prototype_pack: ""
eval_sets:
  validation: ${dataset.validation_jsonl}
  test: ${dataset.test_labeled_jsonl}
output_dir: runs/prototype_pack_eval
respect_pack_embedding_identity: true

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
