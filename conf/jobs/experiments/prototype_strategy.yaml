# @package _global_

defaults:
  - /dataset: ourafla
  - /embedding: mxbai
  - /runtime: gpu_online
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

output:
  base_dir: runs/prototype_strategy

projection_reducers:
  - pca
  - umap

runner:
  _target_: scripts.experiments.prototype_strategy.runner.PrototypeExperimentRunner
  projection_service:
    _target_: scripts.experiments.prototype_strategy.projection.ProjectionService
    seed: 42
    sample_size: 5000
  confidence_threshold: 0.6
  margin_threshold: 0.02
  similarity_name: cosine
  scorer_backend_name: prototype_similarity
  score_policy_name: max_cosine
  score_top_k: null

strategy:
  name: all
  seed: 42
  kmeans_candidate_ks:
    - 1
    - 2
    - 3
    - 4
    - 5
  kmeans_silhouette_sample_size: 2000
  dbscan_eps_values:
    - 0.05
    - 0.1
    - 0.15
    - 0.2
    - 0.25
  dbscan_min_samples_values:
    - 3
    - 5
    - 8
  dbscan_search_sample_size: 3000
  dbscan_min_cluster_coverage: 0.6

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
