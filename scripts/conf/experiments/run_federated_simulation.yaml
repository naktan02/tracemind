# @package _global_

defaults:
  - /dataset: ourafla
  - /embedding: mxbai
  - /runtime: gpu_online
  - /federated_run_preset: smoke
  - /training_algorithm_profile: prototype_pseudo_label_v1
  - /federated_round_runtime: default
  - /federated_training_task: default
  - /federated_validation: default
  - /prototype_builder: single
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

train_jsonl: ${dataset.train_jsonl}
validation_jsonl: ${dataset.validation_jsonl}
published_model_id: tracemind-embed-sim
seed: 42

shard_policy:
  name: label_dominant
  dominant_ratio: 0.75
  client_id_prefix: agent

prototype_rebuild:
  embedding_backend: simulation
  mapping_version: ourafla_to_4cat.v1
  translation_model_id: null
  translation_model_revision: null
  translation_direction: null

diagnostics:
  dump_dir_name: selection_dumps

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
