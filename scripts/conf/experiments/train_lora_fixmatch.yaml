# @package _global_

defaults:
  - /dataset: ourafla
  - /runtime: gpu_online
  - /paper_backbone: mxbai_encoder
  - /lora: default
  - /lora_run_preset: default
  - /query_ssl_train_source: dataset_default
  - /query_ssl_method: fixmatch_usb_v1
  - /query_ssl_augmenter: backtranslation_nllb_en_de_fr_usb_v1
  - /query_adaptation_initial_checkpoint: canonical_fixed_classifier_seed
  - /lora_experiment: default
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

train_jsonl: ${query_ssl_train_source.train_jsonl}
unlabeled_jsonl: ${query_ssl_train_source.unlabeled_jsonl}
output_dir: runs/train_lora_fixmatch

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
