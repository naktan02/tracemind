# @package _global_

defaults:
  - /dataset: ourafla
  - /embedding: mxbai
  - /runtime: gpu_online
  - _self_

output:
  base_dir: data/processed/evaluations/prototype_strategy_experiments

projection_reducers:
  - pca
  - umap

runner:
  _target_: scripts.experiments.prototype_strategy.runner.PrototypeExperimentRunner
  strategies:
    - _target_: scripts.experiments.prototype_strategy.strategies.SinglePrototypeStrategy
    - _target_: scripts.experiments.prototype_strategy.strategies.KMeansPrototypeStrategy
      candidate_ks:
        - 2
        - 3
        - 4
        - 5
      silhouette_sample_size: 2000
      random_state: 42
    - _target_: scripts.experiments.prototype_strategy.strategies.DbscanPrototypeStrategy
      eps_values:
        - 0.05
        - 0.1
        - 0.15
        - 0.2
        - 0.25
      min_samples_values:
        - 3
        - 5
        - 8
      search_sample_size: 3000
      min_cluster_coverage: 0.6
      random_state: 42
  projection_service:
    _target_: scripts.experiments.prototype_strategy.projection.ProjectionService
    seed: 42
    sample_size: 5000
  confidence_threshold: 0.6
  margin_threshold: 0.02

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
