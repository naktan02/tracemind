# @package _global_

defaults:
  - /dataset: ourafla
  - /embedding: mxbai
  - /runtime: gpu_online
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

output:
  base_dir: runs/prototype_threshold_sweep

runner:
  _target_: scripts.experiments.prototype_strategy.sweep.ThresholdPolicyExperimentRunner
  selection_policy:
    _target_: scripts.experiments.prototype_strategy.sweep.ThresholdPolicySelectionPolicy
    minimum_accepted_ratio: 0.5

strategy:
  name: kmeans
  seed: 42
  kmeans_candidate_ks:
    - 2
    - 3
    - 4
    - 5
  kmeans_silhouette_sample_size: 2000
  dbscan_eps_values:
    - 0.05
    - 0.1
    - 0.15
    - 0.2
    - 0.25
  dbscan_min_samples_values:
    - 3
    - 5
    - 8
  dbscan_search_sample_size: 3000
  dbscan_min_cluster_coverage: 0.6

threshold_policies:
  - _target_: scripts.experiments.prototype_strategy.threshold_policies.FixMatchFixedConfidencePolicy
    thresholds:
      - 0.8
      - 0.9
      - 0.95
  - _target_: scripts.experiments.prototype_strategy.threshold_policies.ValidationTargetErrorConfidencePolicy
    target_errors:
      - 0.05
      - 0.1
      - 0.15
    minimum_accepted_count: 1
  - _target_: scripts.experiments.prototype_strategy.threshold_policies.ClasswiseStaticConfidencePolicy
    target_errors:
      - 0.1
      - 0.15
    minimum_accepted_count: 1
    default_confidence_threshold: 1.0

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
