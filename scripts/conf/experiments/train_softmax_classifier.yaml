# @package _global_

defaults:
  - /dataset: ourafla
  - /embedding: mxbai
  - /runtime: gpu_online
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

train_jsonl: ${dataset.train_jsonl}
eval_sets:
  validation: ${dataset.validation_jsonl}
  test: ${dataset.test_labeled_jsonl}
embed_chunk_size: 1024
train_batch_size: 256
epochs: 12
learning_rate: 0.001
weight_decay: 0.0001
selection_set: validation
output_dir: runs/train_classifier
model_output_dir: data/processed/classifier_heads
classifier_version: ""

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
