# @package _global_

defaults:
  - /dataset: ourafla
  - /embedding: mxbai
  - /runtime: gpu_online
  - /paper_backbone: mxbai_encoder
  - /lora: default
  - /lora_run_preset: default
  - /bootstrap_teacher_source: dataset_default
  - /training_algorithm_profile: prototype_pseudo_label_v1
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

bootstrap_version: ""
teacher_train_jsonl: ${bootstrap_teacher_source.teacher_train_jsonl}
teacher_unlabeled_jsonl: ${bootstrap_teacher_source.teacher_unlabeled_jsonl}
teacher_embed_chunk_size: 1024
teacher_train_batch_size: 256
teacher_eval_batch_size: 256
teacher_epochs: 12
teacher_learning_rate: 0.001
teacher_weight_decay: 0.0001
teacher_output_dir: runs/train_classifier
teacher_model_output_dir: data/processed/classifier_heads
teacher_classifier_version: ""
teacher_reuse_manifest_path: data/processed/classifier_heads/clf_2026_04_11_143138.manifest.json

bootstrap_split:
  enabled: false
  unlabeled_ratio: 0.2
  seed: ${seed}

pseudo_label_confidence_threshold: ${training_algorithm_profile.confidence_threshold}
pseudo_label_margin_threshold: ${training_algorithm_profile.margin_threshold}
pseudo_label_acceptance_policy_name: ${training_algorithm_profile.acceptance_policy_name}
bootstrap_export_root: data/processed/lora_bootstrap_classifier_teacher

train_jsonl: ${teacher_train_jsonl}
pseudo_label_jsonl: null
pseudo_label_export_root: data/processed/lora_pseudo_label
student_include_seed_train_rows: false
fixed_categories: ${dataset.prototype_expected_categories}
initial_adapter_dir: ""
initial_classifier_path: ""
eval_sets:
  validation: ${dataset.validation_jsonl}
  test: ${dataset.test_labeled_jsonl}
selection_set: ${lora_run_preset.selection_set}
seed: ${lora_run_preset.seed}
train_batch_size: ${lora_run_preset.train_batch_size}
eval_batch_size: ${lora_run_preset.eval_batch_size}
epochs: ${lora_run_preset.epochs}
learning_rate: ${lora_run_preset.learning_rate}
classifier_learning_rate: ${lora_run_preset.classifier_learning_rate}
weight_decay: ${lora_run_preset.weight_decay}
max_grad_norm: ${lora_run_preset.max_grad_norm}
log_every_steps: ${lora_run_preset.log_every_steps}
output_dir: runs/train_lora_pseudo_label_classifier
adapter_output_dir: data/processed/lora_adapters
classifier_output_dir: data/processed/lora_classifier_heads
trainer_version: ""

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
