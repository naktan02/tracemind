# @package _global_

defaults:
  - /dataset: ourafla
  - /runtime: gpu_online
  - /paper_backbone: mxbai_encoder
  - /lora: default
  - /lora_run_preset: default
  - /lora_train_source: dataset_train
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

train_jsonl: ${lora_train_source.train_jsonl}
eval_sets:
  validation: ${dataset.validation_jsonl}
  test: ${dataset.test_labeled_jsonl}
selection_set: ${lora_run_preset.selection_set}
seed: ${lora_run_preset.seed}
train_batch_size: ${lora_run_preset.train_batch_size}
eval_batch_size: ${lora_run_preset.eval_batch_size}
epochs: ${lora_run_preset.epochs}
learning_rate: ${lora_run_preset.learning_rate}
classifier_learning_rate: ${lora_run_preset.classifier_learning_rate}
weight_decay: ${lora_run_preset.weight_decay}
max_grad_norm: ${lora_run_preset.max_grad_norm}
log_every_steps: ${lora_run_preset.log_every_steps}
output_dir: runs/train_lora_classifier
adapter_output_dir: data/processed/lora_adapters
classifier_output_dir: data/processed/lora_classifier_heads
trainer_version: ""

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
