# @package _global_

defaults:
  - /dataset: ourafla
  - /runtime: gpu_online
  - /paper_backbone: mxbai_encoder
  - /lora: default
  - /lora_run_preset: default
  - /lora_train_source: dataset_train
  - /query_adaptation_initial_checkpoint: none
  - /lora_experiment: default
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

train_jsonl: ${lora_train_source.train_jsonl}
output_dir: runs/train_lora_classifier

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
