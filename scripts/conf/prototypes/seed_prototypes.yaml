# @package _global_

defaults:
  - /dataset: ourafla
  - /embedding: mxbai
  - /runtime: gpu_online
  - /prototype_builder: single
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled
  - _self_

input_jsonl: ${dataset.prototype_input_jsonl}
output_dir: data/processed/prototype_packs
build_state_output_dir: data/processed/prototype_build_states
prototype_version: ""
translation_model_id: null
translation_model_revision: null
translation_direction: null
expected_categories: ${dataset.prototype_expected_categories}

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
