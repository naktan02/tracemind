# Legacy reference only.
# Active dataset pipeline source of truth is `scripts/conf/dataset/*.yaml`.
# This file is kept only as a historical snapshot of the pre-Hydra registry.

schema_version: dataset_registry.v1

defaults:
  raw_dir: data/raw
  labeled_query_set_dir: data/processed/labeled_query_sets
  split_dir: data/processed/splits
  prototype_pack_dir: data/processed/prototype_packs
  pipeline_run_dir: data/processed/pipeline_runs
  cache_dir: hf_cache

datasets:
  ourafla:
    description: ourafla mental health 4-class dataset
    stages:
      - download
      - map
      - split
      - prototype
    sources:
      train:
        kind: huggingface
        dataset_id: ourafla/Mental-Health_Text-Classification_Dataset
        split: train
        data_file: mental_heath_unbanlanced.csv
        output_filename: ourafla_train.csv
        mapping_config: data/mappings/ourafla_to_4cat.v1.toml
        reference_urls:
          - https://huggingface.co/datasets/ourafla/Mental-Health_Text-Classification_Dataset
      test:
        kind: huggingface
        dataset_id: ourafla/Mental-Health_Text-Classification_Dataset
        split: test
        data_file: mental_health_combined_test.csv
        output_filename: ourafla_test.csv
        mapping_config: data/mappings/ourafla_test_to_4cat.v1.toml
        reference_urls:
          - https://huggingface.co/datasets/ourafla/Mental-Health_Text-Classification_Dataset
    split:
      source: train
      split_name: ourafla_train_split.v1
      validation_ratio: 0.1
      seed: 42
    prototype:
      source: split_train
      backend: transformers_mxbai
      embedding_model_id: mixedbread-ai/mxbai-embed-large-v1
      embedding_model_revision: main
      batch_size: 16
      device: auto
      task_prefix: ""
      local_files_only: false
      expected_categories:
        - anxiety
        - depression
        - normal
        - suicidal
      prototype_version_prefix: ourafla_mxbai
      hash_dim: 256

  cssrs:
    description: CSSRS-labelled Reddit SuicideWatch dataset
    stages:
      - download
    sources:
      train:
        kind: huggingface
        dataset_id: av9ash/CSSR-S_labelled_suicidewatch_posts_reddit
        split: train
        data_file: labeled_rSuicidewatch_posts.csv
        output_filename: cssrs_train.csv
        mapping_config: data/mappings/cssrs_to_4cat.v1.toml
        reference_urls:
          - https://www.kaggle.com/datasets/av9ash/labelled-reddit-suicidewatch-posts-cssr-s
          - https://huggingface.co/datasets/av9ash/CSSR-S_labelled_suicidewatch_posts_reddit
