dataset:
  train_jsonl: data/processed/splits/ourafla_train_split.v1.train.jsonl
  validation_jsonl: data/processed/splits/ourafla_train_split.v1.validation.jsonl
  test_jsonl: data/processed/labeled_query_sets/ourafla_mental_health_text_classification_test.v1.jsonl

embedding:
  backend: transformers_mxbai
  model_id: mixedbread-ai/mxbai-embed-large-v1
  revision: main
  batch_size: 16
  cache_dir: hf_cache
  device: auto
  task_prefix: ""
  local_files_only: false
  hash_dim: 256

thresholds:
  confidence_threshold: 0.8
  margin_threshold: 0.15

projection:
  sample_size: 5000
  reducers:
    - pca
    - umap

strategies:
  kmeans:
    candidate_ks:
      - 2
      - 3
      - 4
      - 5
    silhouette_sample_size: 2000
  dbscan:
    eps_values:
      - 0.05
      - 0.1
      - 0.15
      - 0.2
      - 0.25
    min_samples_values:
      - 3
      - 5
      - 8
    search_sample_size: 3000
    min_cluster_coverage: 0.6

output:
  output_dir: data/processed/evaluations/prototype_strategy_experiments

runtime:
  seed: 42
